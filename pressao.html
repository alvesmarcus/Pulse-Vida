<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="Css/pressao.css">
<link rel="icon" type="image/png" href="imagens/favicon.png">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#2aa7fa">
<title>Pressão</title>
</head>

<body>

<!-- TOPO -->
<header class="topo">
  <button class="btn-voltar" onclick="voltar()">← Voltar</button>
</header>

<!-- CONTAINER -->
<div class="container">

  <div class="card">

    <h2>Registrar Pressão</h2>

    <input id="sis" placeholder="Sistólica (ex: 120)">
    <input id="dia" placeholder="Diastólica (ex: 80)">
    <input id="bpm" placeholder="BPM">

    <button onclick="salvar()">Salvar</button>

    <!-- STATUS -->
    <h3 id="status"></h3>

  </div>

</div>

<script>

// 🔐 PROTEÇÃO
const cpf = localStorage.getItem("cpfLogado");

if (!cpf) {
  window.location.href = "login.html";
}

// 🔙 VOLTAR
function voltar() {
  window.location.href = "aba_a.html";
}

// 💾 SALVAR PRESSÃO
function salvar() {

  const sisVal = parseInt(document.getElementById("sis").value);
  const diaVal = parseInt(document.getElementById("dia").value);

  if (!sisVal || !diaVal) {
    alert("Preencha corretamente!");
    return;
  }

  let classificacao = "";
  let classe = "";

  // 🔥 CLASSIFICAÇÃO
  if (sisVal >= 180 || diaVal >= 120) {
    classificacao = "🔴 CRÍTICO";
    classe = "status-critico";
  }
  else if (sisVal >= 140 || diaVal >= 90) {
    classificacao = "🟡 ATENÇÃO";
    classe = "status-alerta";
  }
  else {
    classificacao = "🟢 NORMAL";
    classe = "status-normal";
  }



  // 💾 SALVAR DADOS
const dados = {
  pressao: sisVal + "/" + diaVal,
  bpm: document.getElementById("bpm").value || 0,
  status: classificacao,
  data: new Date().toISOString() // 🔥 NOVO
};
  localStorage.setItem("dadosSaude_" + cpf, JSON.stringify(dados));

  // 🔄 VOLTAR PARA DASHBOARD
  setTimeout(() => {
    window.location.href = "aba_a.html";
  }, 1200);
}

</script>

<script src="app.js"></script>
</body>
</html>
